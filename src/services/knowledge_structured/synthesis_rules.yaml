# Synthesis rules — always injected. High-level structural patterns for contract generation.
# These are intent-level constraints with canonical code shapes to reduce LLM drift.

multisig:
  rules:
    - id: MULTISIG-DISTINCT-KEYS
      rule: "All pubkeys in a multisig MUST be distinct. Add require(pk1 != pk2) for every pair."
    - id: MULTISIG-DISTINCT-SIGS
      rule: "Use distinct signature variable names per signer (aliceSig, bobSig, carolSig)."
    - id: MULTISIG-THRESHOLD
      rule: "Implement threshold using integer accumulation of checkSig() results, not nested AND/OR chains."

  canonical_2_of_3:
    description: "Standard 2-of-3 multisig. Use checkMultiSig — no ternary, no accumulation variables."
    shape: |
      require(pk1 != pk2);
      require(pk1 != pk3);
      require(pk2 != pk3);
      require(checkMultiSig([sig1, sig2], [pk1, pk2, pk3]));
    notes:
      - "checkMultiSig([sigs], [pubkeys]) requires any 2 valid sigs from the 3 pubkeys."
      - "NEVER write: checkSig(...) ? 1 : 0  — ternary is FORBIDDEN in CashScript."
      - "NEVER accumulate with +=  — compound assignment is FORBIDDEN in CashScript."

  canonical_2_of_2:
    description: "Standard 2-of-2 multisig pattern with full output anchoring (value + lockingBytecode continuity)."
    shape: |
      require(pk1 != pk2);
      require(tx.outputs.length == 1);
      require(tx.outputs[0].lockingBytecode == tx.inputs[this.activeInputIndex].lockingBytecode);
      require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
      require(checkSig(sig1, pk1));
      require(checkSig(sig2, pk2));
    notes:
      - "Output count MUST be validated to prevent extra outputs draining funds."
      - "lockingBytecode continuity MUST be enforced to prevent output redirection attacks."
      - "Output value MUST equal input value — no implicit fee arithmetic."

  canonical_split_2party:
    description: "Canonical 2-party fund split. Pass expected recipient bytecodes as bytes20 constructor params. NO LockingBytecodeP2PKH() constructor calls."
    constructor_params: "bytes20 recipient1, bytes20 recipient2"
    shape: |
      require(checkSig(sig1, pk1));
      require(checkSig(sig2, pk2));
      require(tx.outputs.length == 2);

      // Recipient validation via constructor-injected bytecodes (no constructor call needed)
      require(tx.outputs[0].lockingBytecode == recipient1);
      require(tx.outputs[1].lockingBytecode == recipient2);

      // MANDATORY: Sum-preservation invariant — total output must equal input
      require(
          tx.outputs[0].value + tx.outputs[1].value ==
          tx.inputs[this.activeInputIndex].value
      );
    notes:
      - "NEVER call LockingBytecodeP2PKH(...) unless the bytes20 param is explicitly defined."
      - "Pass recipient1 and recipient2 as bytes20 constructor params — validates locking bytecode directly."
      - "Sum-preservation is NON-NEGOTIABLE — both values must sum to the input value."
      - "Do NOT use division for 50/50 split — use explicit value params or subtraction."
      - "No loops. No iteration over outputs."

  canonical_split_nparty:
    description: "N-party fund or token split. Pass recipient bytecodes as bytes constructor params. NO LockingBytecodeP2PKH() in constructor."
    constructor_params: "bytes recipient1, bytes recipient2, ... // one per output"
    shape: |
      require(checkSig(ownerSig, owner));
      require(tx.outputs.length == N);

      require(tx.outputs[0].lockingBytecode == recipient1);
      // ... one lockingBytecode check per output

      require(
          tx.outputs[0].value + tx.outputs[1].value + ... + tx.outputs[N-1].value ==
          tx.inputs[this.activeInputIndex].value
      );
      // When tokens:
      require(
          tx.outputs[0].tokenAmount + ... + tx.outputs[N-1].tokenAmount ==
          tx.inputs[this.activeInputIndex].tokenAmount
      );
    notes:
      - "NEVER call LockingBytecodeP2PKH(pubkey) — use bytes constructor params."
      - "Sum-preservation across ALL outputs is NON-NEGOTIABLE."
      - "No loops. Unroll checks for each output index."

  canonical_revenue_share_split:
    description: "4-way (or N-way) revenue share with predetermined shares. MUST include explicit sum require."
    shape: |
      require(checkSig(ownerSig, owner));
      require(tx.outputs.length == 4);

      int inputValue = tx.inputs[this.activeInputIndex].value;
      int totalShares = share1 + share2 + share3 + share4;
      require(totalShares > 0);

      require(tx.outputs[0].value == (inputValue * share1) / totalShares);
      require(tx.outputs[1].value == (inputValue * share2) / totalShares);
      require(tx.outputs[2].value == (inputValue * share3) / totalShares);
      require(tx.outputs[3].value == (inputValue * share4) / totalShares);

      require(
          tx.outputs[0].value + tx.outputs[1].value + tx.outputs[2].value + tx.outputs[3].value ==
          tx.inputs[this.activeInputIndex].value
      );
    notes:
      - "Per-output proportional requires are NOT sufficient alone — explicit chained sum is mandatory."
      - "Unroll for N partners; keep the final sum require."

timelock:
  rules:
    - id: TIMELOCK-GTE
      rule: "Use tx.time >= deadline for absolute timelocks (CLTV). NEVER use tx.inputs[i].time."
    - id: TIMELOCK-AGE
      rule: "Use tx.age >= period for relative timelocks (CSV)."
  canonical_absolute:
    shape: "require(tx.time >= timeoutTimestamp);"
    notes:
      - "tx.time is the block time. It is NOT tx.inputs[i].time — that field does not exist."
  canonical_relative:
    shape: "require(tx.age >= 30);"  # 30 blocks

escrow:
  rules:
    - id: ESCROW-BRANCH
      rule: "Escrow contracts must have a release branch (multi-party) and a reclaim branch (timeout)."
    - id: ESCROW-RECLAIM
      rule: "Reclaim branch must require both: (1) timeout check and (2) original sender signature."

  release_branch:
    must:
      - "Signature threshold logic (e.g. 2-of-3)"
      - "require(pk1 != pk2) distinctness checks for all signer pairs"
  reclaim_branch:
    must:
      - "require(tx.time >= timeoutTimestamp);"
      - "require(checkSig(reclaimerSig, originalSender));  // Reclaimer auth"
    canonical_shape: |
      function reclaim(sig reclaimerSig, int timeoutTimestamp) {
          require(tx.time >= timeoutTimestamp);
          require(checkSig(reclaimerSig, originalSender));
      }

general:
  - id: NO-FEE-ASSUMPTION
    rule: "Do not calculate miner fees via arithmetic (inputValue - outputValue). Use fixed output amounts."
  - id: NO-DIVISION-ZERO
    rule: "Before any division, require(divisor > 0) to prevent division-by-zero."
  - id: NO-TAUTOLOGY
    rule: "Do not write tautological guards like require(x == x). All guards must be meaningful."
  - id: NO-EMPTY-FUNCTION
    rule: "Every function body must contain at least one require() statement."
  - id: NO-HARDCODED-INDEX
    rule: "NEVER write require(this.activeInputIndex == 0). This is NOT a valid security guard."
    note: "this.activeInputIndex is for FIELD ACCESS only: tx.inputs[this.activeInputIndex].value"
    correct: "tx.inputs[this.activeInputIndex].lockingBytecode == this.activeBytecode"
    wrong:   "require(this.activeInputIndex == 0)  // FORBIDDEN"
  - id: VALUE-ANCHORING
    rule: "Every spending function MUST enforce exact output value: require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value)."
    note: "This prevents partial fund drain. No fee arithmetic — use a named 'fee' constructor param if needed."
  - id: OUTPUT-COUNT-STRICT
    rule: "Contracts that generate multiple outputs MUST explicitly validate tx.outputs.length before accessing any output index."

distribution:
  description: "Single-spend payout contracts. Funds exit the contract permanently. NO self-continuation."
  rules:
    - id: DISTRIBUTION-NO-SELF-ANCHOR
      rule: "Distribution contracts MUST NOT use this.activeBytecode. Funds are sent externally."
    - id: DISTRIBUTION-RECIPIENT
      rule: "Recipient MUST be a constructor param (bytes recipientLockingBytecode). Never hardcode."
    - id: DISTRIBUTION-VALUE
      rule: "MUST enforce require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value)."
    - id: DISTRIBUTION-OUTPUT-GUARD
      rule: "MUST enforce require(tx.outputs.length == 1) before accessing tx.outputs[0]."
    - id: DISTRIBUTION-AUTH
      rule: "MUST require owner signature: require(checkSig(ownerSig, owner))."

  canonical_payout:
    description: "Canonical single-spend payout. Owner authorizes, funds go to external recipient permanently."
    constructor_params: "pubkey owner, bytes recipientLockingBytecode"
    shape: |
      require(checkSig(ownerSig, owner));
      require(tx.outputs.length == 1);
      require(tx.outputs[0].lockingBytecode == recipientLockingBytecode);
      require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
    notes:
      - "Use bytes (not bytes20) for recipientLockingBytecode — supports P2PKH, P2SH20, P2SH32."
      - "DO NOT add this.activeBytecode — distribution contracts do NOT continue themselves."
      - "DO NOT subtract fees — pass full value to recipient."

  token_transfer:
    description: "Token payout / transfer. Preserves tokenCategory and tokenAmount to new recipient."
    constructor_params: "pubkey owner, bytes recipientLockingBytecode"
    shape: |
      require(checkSig(ownerSig, owner));
      require(tx.outputs.length == 1);
      require(tx.outputs[0].tokenCategory == tx.inputs[this.activeInputIndex].tokenCategory);
      require(tx.outputs[0].tokenAmount == tx.inputs[this.activeInputIndex].tokenAmount);
      require(tx.outputs[0].lockingBytecode == recipientLockingBytecode);
      require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
    notes:
      - "tokenCategory and tokenAmount MUST both be preserved unless explicitly minting/burning."
      - "DO NOT use this.activeBytecode — this is a distribution, not a covenant."

vault:
  description: "Delayed-withdrawal covenant vaults. Prefer canonical shapes below over multi-output exploration."
  rules:
    - id: VAULT-OUTPUT-ORDER
      rule: "require(tx.outputs.length == N) MUST be the first guard in every function that touches outputs."
    - id: VAULT-NO-MULTI-EXPLORE
      rule: "Do NOT use 3+ output announce shapes unless intent explicitly requires split staging."

  canonical_backup_cancel:
    description: "Announce (1-output re-anchor) → claim after delay → backup cancel. vr_010."
    constructor_params: "pubkey owner, pubkey backupKey, int delaySeconds"
    shape: |
      function announce(sig ownerSig) {
          require(tx.outputs.length == 1);
          require(tx.outputs[0].lockingBytecode == this.activeBytecode);
          require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
      }
      function claim(sig ownerSig) {
          require(this.age >= delaySeconds);
          require(tx.outputs.length == 1);
          require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
      }
      function cancel(sig backupSig) {
          require(tx.outputs.length == 1);
          require(tx.outputs[0].lockingBytecode == this.activeBytecode);
          require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
      }
    notes:
      - "Use exactly 3 functions — no extra staged withdrawal outputs."
      - "cancel MUST be named cancel or emergencyCancel for cancellation_path detection."

  canonical_founder_treasury:
    description: "Founder ops limit + staged large withdrawal + cold recovery. vr_023 / vr_009."
    constructor_params: "pubkey founder, pubkey coldKey, int opsLimitSats, int largeDelaySeconds, bytes recipientLockingBytecode"
    shape: |
      function instantSpend(sig founderSig, int amount) {
          require(amount <= opsLimitSats);
          require(tx.outputs.length == 2);
          require(tx.outputs[0].lockingBytecode == this.activeBytecode);
          require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value - amount);
      }
      function stageLargeWithdrawal(sig founderSig, int amount) {
          require(amount > opsLimitSats);
          require(tx.outputs.length == 2);
          require(tx.outputs[0].lockingBytecode == this.activeBytecode);
          require(tx.outputs[1].lockingBytecode == this.activeBytecode);
      }
      function finalizeLargeWithdrawal(sig founderSig) {
          require(this.age >= largeDelaySeconds);
          require(tx.outputs.length == 1);
      }
      function emergencyRecover(sig coldKeySig) {
          require(tx.outputs.length == 1);
      }
    notes:
      - "instantSpend for amounts <= opsLimitSats; stageLargeWithdrawal when amount > opsLimitSats."
      - "emergencyRecover / coldKeyRecovery for immediate cold-key recovery without delay."

refundable_payment:
  description: "Refundable payment patterns — prefer lint-safe dual-path shapes over covenant remainder splits."
  rules:
    - id: REFUND-NO-REMAINDER-SPLIT
      rule: "Subscription/refundable flows MUST NOT use input.value - payoutAmount unless profile disables LNC-005."
    - id: REFUND-TIME-STANDALONE
      rule: "Use require(tx.time >= deadline) only — no nested tx.time arithmetic (LNC-010)."
    - id: REFUND-DIVISION-GUARD
      rule: "Before division require(divisor > 0) (LNC-011)."

  canonical_subscription:
    description: "Monthly service claim + subscriber cancel with full-value paths. rp_003."
    constructor_params: "pubkey service, pubkey subscriber, int monthlyPeriod"
    shape: |
      function claim(sig serviceSig) {
          require(tx.time >= monthlyPeriod);
          require(tx.outputs.length == 1);
          require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
      }
      function cancel(sig subscriberSig) {
          require(tx.outputs.length == 1);
          require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
      }
    notes:
      - "Do NOT stage remainder with 2-output covenant — triggers LNC-005 in escrow mode."

  canonical_gradual_release:
    description: "Timed partial claim + sender refund after inactivity. rp_004."
    constructor_params: "pubkey recipient, pubkey sender, int periodEnd, int inactiveEnd"
    shape: |
      function claim(sig recipientSig, int payoutAmount) {
          require(tx.time >= periodEnd);
          require(payoutAmount > 0);
          require(tx.outputs.length == 1);
          require(tx.outputs[0].value == payoutAmount);
      }
      function refund(sig senderSig) {
          require(tx.time >= inactiveEnd);
          require(tx.outputs.length == 1);
          require(tx.outputs[0].value == tx.inputs[this.activeInputIndex].value);
      }
    notes:
      - "Avoid 3-output self-anchor vesting without explicit sum conservation (LNC-016)."
      - "Pass releaseAfterTime / inactiveAfterTime as ints; do not compute tx.time - startTime in-body."

streaming:
  description: "Continuous linear release or decay of funds over time (streaming)."
  rules:
    - id: STREAM-INTERPOLATION
      rule: "DO NOT use tx.time in math. Pass 'int requestTime' as an argument, use require(tx.time >= requestTime), and use requestTime for math."
    - id: STREAM-CONTINUATION
      rule: "MUST use self-continuation (this.activeBytecode) for the remaining balance."
    - id: STREAM-VALUE-ANCHOR
      rule: "The sum of the payout and the continuation MUST equal the input value."
  canonical_linear:
    description: "Linear streaming payout using a validated requestTime parameter."
    shape: |
      function claim(sig beneficiarySig, int requestTime, int claimAmount) {
          // 1. Validate time (tx.time is MINIMUM, requestTime is TARGET)
          require(tx.time >= requestTime);
          require(requestTime >= startTime);
          
          // 2. Linear math using requestTime (NOT tx.time)
          int elapsed = requestTime - startTime;
          int duration = endTime - startTime;
          int vested = (totalAmount * elapsed) / duration;
          
          int maxClaimable = vested - alreadyWithdrawn;
          require(claimAmount <= maxClaimable);
          
          // 3. Authorization
          require(checkSig(beneficiarySig, beneficiary));
          
          // 4. Covenant: payout + remainder == input
          require(tx.outputs.length == 2);
          require(tx.outputs[1].lockingBytecode == this.activeBytecode);
          require(tx.outputs[0].value + tx.outputs[1].value == tx.inputs[this.activeInputIndex].value);
      }
    notes:
      - "State tracking (alreadyWithdrawn) often requires an NFT or stateful parameter update."
      - "For simple decay where the balance just drops, initialBalance is used instead of totalAmount."
