<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexOps | Benchmark Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Run History -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">N</span>
                    <span class="logo-text">NexOps</span>
                </div>
                <button id="new-btn" class="btn-primary-sm">+ New Run</button>
            </div>
            <div class="history-list" id="history-list">
                <!-- History items injected here -->
                <div class="loading-spinner">Loading history...</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <h1>Benchmark Visualizer</h1>
                <div class="nav-actions">
                    <span id="connection-status" class="status-badge disconnected">Disconnected</span>
                </div>
            </header>

            <section id="input-view" class="view">
                <div class="card editor-card">
                    <div class="card-header">
                        <h2>Run New Benchmark</h2>
                        <span class="subtitle">Paste your YAML test cases below</span>
                    </div>
                    <div class="editor-container">
                        <textarea id="yaml-input" placeholder="- id: test_case_1
  pattern: escrow
  difficulty: easy
  intent: ..."></textarea>
                    </div>
                    <div class="card-footer">
                        <div class="config-row">
                            <input type="text" id="tags-input" placeholder="Filter by tags (comma separated)">
                            <select id="model-select">
                                <option value="">Default Model</option>
                                <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                                <option value="gpt-4o">GPT-4o</option>
                            </select>
                        </div>
                        <button id="run-btn" class="btn-primary">Execute Benchmark</button>
                    </div>
                </div>
            </section>

            <section id="progress-view" class="view hidden">
                <div class="card progress-card">
                    <div class="progress-info">
                        <div class="current-task">
                            <span class="label">Running:</span>
                            <h2 id="current-case-name">Initializing...</h2>
                        </div>
                        <div class="progress-stats">
                            <span id="case-count">0 / 0</span>
                            <div class="progress-bar-bg">
                                <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="terminal-container">
                        <div class="terminal-header">Live Process Log</div>
                        <div id="log-output" class="log-output"></div>
                    </div>
                </div>
            </section>

            <section id="result-view" class="view hidden">
                <div class="result-header">
                    <div class="summary-badges">
                        <div class="summary-badge score">
                            <span class="label">Quality Score</span>
                            <span id="final-score" class="value">0.000</span>
                        </div>
                        <div class="summary-badge stats">
                            <span class="label">Pass Rate</span>
                            <span id="pass-rate" class="value">0%</span>
                        </div>
                        <div class="summary-badge latency">
                            <span class="label">Avg Latency</span>
                            <span id="avg-latency" class="value">0.0s</span>
                        </div>
                    </div>
                    <div class="result-actions">
                        <button id="copy-ai-btn" class="btn-secondary">Copy Profile for AI</button>
                        <button id="raw-json-btn" class="btn-secondary">Raw JSON</button>
                    </div>
                </div>

                <div class="card table-card">
                    <table id="results-table">
                        <thead>
                            <tr>
                                <th>Test Case ID</th>
                                <th>Difficulty</th>
                                <th>Compile</th>
                                <th>Intent Scope</th>
                                <th>Latency</th>
                                <th>Score</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="results-body">
                            <!-- Results injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Inspector Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Result Detail</h3>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="inspector-tabs">
                    <button class="tab-btn active" data-tab="code">Generated Code</button>
                    <button class="tab-btn" data-tab="stats">Statistics</button>
                    <button class="tab-btn" data-tab="json">Raw Metrics</button>
                </div>
                <div id="tab-code" class="tab-content">
                    <pre><code id="code-preview" class="language-cashscript"></code></pre>
                </div>
                <div id="tab-stats" class="tab-content hidden">
                    <div id="stats-preview" class="stats-grid"></div>
                </div>
                <div id="tab-json" class="tab-content hidden">
                    <pre><code id="json-preview"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js?v=3"></script>
</body>
</html>
