- id: batch4_vesting_cliff
  pattern: vesting
  difficulty: medium
  intent: "token vesting contract with 90 day cliff"
  required_features:
    - owner_signature
    - timelock_refund
  critical_features:
    - timelock_refund
  expected_structure:
    require_count_min: 2
  tags: ["batch4", "vesting", "cliff"]

- id: batch4_linear_vesting
  pattern: vesting
  difficulty: medium
  intent: "linear token vesting releasing proportionally over time"
  required_features:
    - owner_signature
    - timelock_refund
  critical_features:
    - timelock_refund
  expected_structure:
    require_count_min: 3
  tags: ["batch4", "vesting", "linear"]

- id: batch4_stateful_counter
  pattern: stateful
  difficulty: hard
  intent: "stateful contract tracking internal counter and updating state each spend"
  required_features:
    - stateful
    - owner_signature
  critical_features:
    - stateful
  expected_structure:
    require_count_min: 3
    must_contain:
      - this.activeBytecode
  tags: ["batch4", "stateful", "counter"]
