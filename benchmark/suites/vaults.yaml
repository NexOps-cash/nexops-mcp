- id: v_006
  pattern: vault
  difficulty: hard
  intent: |
    FAILURE CASE: Vault with covenant that locks funds permanently by always requiring output to same contract.
  required_features:
    - covenant_continuation
  critical_features:
    - must_fail_permanent_covenant
  expected_structure:
    require_count_min: 3
  tags: ["vault", "failure", "vulnerability"]

