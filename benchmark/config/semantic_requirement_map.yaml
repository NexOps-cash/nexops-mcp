# Declarative requirement -> capability mapping (Wave 1.5)
# satisfy_via: capability key OR legacy alias pool key
# fallback: regex_alias | detected_feature | none

mappings:
  # required_features (YAML capability names)
  signature_verification:
    capability: has_signature_auth
    fallback: regex_alias
    alias_pool_key: valid_signature_check
  token_validation:
    capability: token_category_constrained
    any_capabilities: [preserves_token_amount, burns_output_tokens]
    fallback: regex_alias
  covenant_continuation:
    capability: reanchors_covenant
    fallback: regex_alias
  output_destination_validation:
    capability: migratory_output
    fallback: detected_feature
    detected: locking_bytecode
  output_value_validation:
    capability: terminating_output
    fallback: detected_feature
    detected: output_value_validation
  time_validation:
    fallback: regex_alias
    alias_pool_key: locktime_check

  # critical_features (semantic suite)
  valid_signature_check:
    capability: has_signature_auth
    fallback: regex_alias
  token_category_check:
    capability: preserves_token_category
    any_capabilities: [token_category_constrained, burns_output_tokens]
    fallback: none
  token_amount_check:
    capability: preserves_token_amount
    any_capabilities: [preserves_split_token_supply, burns_output_tokens]
    fallback: none
  covenant_self_reference:
    capability: reanchors_covenant
    fallback: regex_alias
  soulbound_no_external_transfer:
    capability: unrestricted_external_transfer
    negate: true
    fallback: regex_alias
  state_transition_commitment:
    capability: reanchors_covenant
    fallback: regex_alias
  terminating_payout_path:
    capability: terminating_output
    fallback: regex_alias
  migratory_locking_bytecode:
    capability: migratory_output
    fallback: regex_alias
  burn_supply_reduction:
    capability: burns_output_tokens
    fallback: regex_alias
  no_mint_increase:
    capability: capability_retained
    fallback: regex_alias
  mint_cap_guard:
    capability: enforces_supply_cap
    fallback: regex_alias
  supply_cap_enforcement:
    capability: enforces_supply_cap
    fallback: none
  must_fail_unbounded_mint:
    capability: enforces_supply_cap
    negate: true
    fallback: regex_alias
  must_fail_authority_leak:
    fallback: regex_alias
    alias_pool_key: must_fail_authority_leak
  must_fail_token_category_drift:
    fallback: regex_alias
    alias_pool_key: must_fail_token_category_drift
  must_fail_token_amount_inflation:
    fallback: regex_alias
    alias_pool_key: must_fail_token_amount_inflation
  must_fail_token_amount_burn:
    fallback: regex_alias
    alias_pool_key: must_fail_token_amount_burn
  must_fail_nft_commitment_loss:
    fallback: regex_alias
    alias_pool_key: must_fail_nft_commitment_loss
  must_fail_hybrid_continuity_break:
    fallback: regex_alias
    alias_pool_key: must_fail_hybrid_continuity_break
  must_fail_unrestricted_token_transfer:
    fallback: regex_alias
    alias_pool_key: must_fail_unrestricted_token_transfer
  minting_authority_custody:
    capability: capability_retained
    negate_capability: capability_escaped
    fallback: regex_alias
  capability_byte_match:
    capability: capability_retained
    fallback: regex_alias
  redeem_burn_termination:
    all_capabilities: [burns_output_tokens, terminating_output]
    fallback: regex_alias
  expiry_time_check:
    capability: terminating_output
    fallback: regex_alias
  governance_commitment_mutate:
    capability: requires_multisig
    fallback: regex_alias
  output_amount_check:
    capability: terminating_output
    fallback: regex_alias
  locktime_check:
    capability: time_validation
    fallback: regex_alias
    alias_pool_key: locktime_check
  time_validation:
    fallback: regex_alias
    alias_pool_key: locktime_check
  timestamp_based:
    fallback: regex_alias
    alias_pool_key: timestamp_based
  block_height_based:
    fallback: regex_alias
    alias_pool_key: block_height_based
  relative_timelock:
    fallback: regex_alias
    alias_pool_key: relative_timelock
  sequence_check:
    fallback: regex_alias
    alias_pool_key: sequence_check
  must_fail_wrong_time_field:
    fallback: regex_alias
    alias_pool_key: must_fail_wrong_time_field
  two_of_three_logic:
    capability: has_multisig_auth
    fallback: regex_alias
  three_of_five_logic:
    fallback: regex_alias
    alias_pool_key: three_of_five_logic
  must_fail_pubkey_substitution:
    fallback: regex_alias
    alias_pool_key: must_fail_pubkey_substitution
  must_fail_duplicate_signer:
    fallback: regex_alias
    alias_pool_key: must_fail_duplicate_signer
  alice_signature:
    fallback: detected_feature
    detected: alice_signature
  bob_signature:
    fallback: detected_feature
    detected: bob_signature
  carol_signature:
    fallback: detected_feature
    detected: carol_signature

  # escrow.yaml / escrow_suite role-based features
  multisig:
    fallback: regex_alias
    alias_pool_key: multisig
  both_signatures_required:
    fallback: regex_alias
    alias_pool_key: both_signatures_required
  buyer_signature:
    fallback: detected_feature
    detected: buyer_signature
  seller_signature:
    fallback: detected_feature
    detected: seller_signature
  arbitrator_signature:
    fallback: detected_feature
    detected: arbitrator_signature
  arbiter_signature:
    fallback: detected_feature
    detected: arbitrator_signature
  multisig_2of3:
    fallback: detected_feature
    detected: multisig_2of3
  multisig_2of2:
    fallback: detected_feature
    detected: multisig_2of2
  timelock_refund:
    fallback: detected_feature
    detected: timelock_refund
  locking_bytecode:
    fallback: detected_feature
    detected: locking_bytecode
  multiple_paths:
    fallback: regex_alias
    alias_pool_key: multiple_paths
  output_lockingbytecode_check:
    fallback: regex_alias
    alias_pool_key: output_lockingbytecode_check
  must_fail_missing_destination_check:
    fallback: regex_alias
    alias_pool_key: must_fail_missing_destination_check
  must_fail_permanent_covenant:
    fallback: regex_alias
    alias_pool_key: must_fail_permanent_covenant
