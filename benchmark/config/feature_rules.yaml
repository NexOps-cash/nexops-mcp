features:
  timelock_unlock:
    rule: '(tx\.(time|age)|this\.age)\s*>=\s*\w+'
    description: "Delayed execution using tx.time, tx.age, or this.age"
  timelock_refund:
    rule: 'require\s*\(\s*(tx\.(time|age)|this\.age)\s*>=\s*\w+\s*\)'
    description: "Timelock using tx.time, tx.age, or this.age in a require"
  timestamp_based:
    rule: '(?:unlockTimestamp|UnlockTimestamp)\b'
    description: "Absolute Unix timestamp CLTV (constructor or param naming)"
  block_height_based:
    rule: '(?:unlockHeight|BlockHeight|blockHeight|lockBlocks|unlockBlocks)\b|(?:this\.age|tx\.age)\s*>=\s*(?:lockBlocks|unlockBlocks)\b'
    description: "Block-height CLTV or block-count CSV maturity"
  relative_timelock:
    rule: '(?:tx\.age|this\.age)\s*>=\s*\w+'
    description: "Relative timelock via CSV (tx.age or this.age)"
  sequence_check:
    rule: 'this\.age\s*>=\s*\w+'
    description: "Relative sequence maturity via this.age"
  multisig_2of2:
    rule: 'checkSig\([^)]+\)\s*&&\s*checkSig\([^)]+\)|function\s+\w+\s*\([^)]*\)\s*\{[^}]*checkSig[^}]*checkSig'
    description: "Two signature checks in one require or one spend function body"
  multisig_2of3:
    rule: 'checkMultiSig\s*\(\s*\[[^\]]+,[^\]]+\]\s*,\s*\[[^\]]+,[^\]]+,[^\]]+\]\s*\)'
    description: "2-of-3 threshold multisig"
  covenant:
    rule: 'this\.activeBytecode\b'
    description: "Covenant self-continuity via this.activeBytecode"
  hashlock:
    rule: '(?:hash160|sha256|hash256|ripemd160)\s*\(\s*\w+\s*\)\s*==\s*\w+'
    description: "Hashlock preimage verification (hash256/sha256/hash160)"
  hash_verification:
    rule: '(?:hash160|sha256|hash256|ripemd160)\s*\(\s*\w+\s*\)\s*==\s*\w+'
    description: "Preimage hash equality check"
  preimage_validation:
    rule: 'function\s+\w+\s*\([^)]*\b(?:preimage|secret)\b'
    description: "Spend function accepts preimage or secret bytes"
  sha256_check:
    rule: '(?:hash256|sha256)\s*\(\s*\w+\s*\)\s*==\s*\w+'
    description: "SHA256 / hash256 preimage check"
  ripemd160_check:
    rule: '(?:hash160|ripemd160)\s*\(\s*\w+\s*\)\s*==\s*\w+'
    description: "RIPEMD160 / hash160 preimage check"
  multiple_preimages:
    rule: '(?:hash256|sha256|hash160|ripemd160)\s*\(\s*\w+\s*\)\s*==[^;]{0,200}(?:hash256|sha256|hash160|ripemd160)\s*\(\s*\w+\s*\)\s*=='
    description: "Two hash preimage checks in one contract"
  token_amount:
    rule: '\.tokenAmount\s*==\s*\w+'
    description: "Token amount equality check"
  locking_bytecode:
    rule: '\.lockingBytecode\s*==\s*\w+'
    description: "Output destination validation"
  value_check:
    rule: 'tx\.outputs\[\d+\]\.value\s*==\s*'
    description: "Output value equality check"
  output_value_validation:
    rule: 'tx\.outputs\[\d+\]\.value\s*==\s*'
    description: "Detected output value validation"
  token_nft_commitment:
    rule: '\.nftCommitment\s*==\s*'
    description: "NFT commitment equality preservation"
  capability_mutable:
    rule: 'tokenCategory\s*==\s*[^;]+\+\s*0x01\b'
    description: "Mutable NFT capability suffix (+0x01)"
  capability_minting:
    rule: 'tokenCategory\s*==\s*[^;]+\+\s*0x02\b'
    description: "Minting NFT capability suffix (+0x02)"
  bch_only_output:
    rule: 'tx\.outputs\[\d+\]\.tokenCategory\s*==\s*0x\b'
    description: "BCH-only output guard (no tokens on output)"
  self_anchor_minting:
    rule: 'this\.activeBytecode'
    description: "Contract self-anchor reference (minting custody heuristic)"
  multiple_outputs:
    rule: 'tx\.outputs\.length\s*==\s*(?:[3-9]|\d{2,})'
    description: "Explicit output count of three or more"
  announce_phase:
    rule: 'function\s+\w*(?:announce|stage)\w*\s*\('
    description: "Vault announcement / staging function"
  finalize_phase:
    rule: 'function\s+\w*(?:finalize|claim)\w*\s*\('
    description: "Vault delayed claim / finalize function"
  reanchor_pattern:
    rule: 'tx\.outputs\[\d+\]\.lockingBytecode\s*==\s*this\.activeBytecode'
    description: "Covenant re-anchor to this.activeBytecode"
  value_preservation:
    rule: 'tx\.outputs\[\d+\]\.value\s*==\s*tx\.inputs\[this\.activeInputIndex\]\.value'
    description: "Full input value preserved on output"
  staged_spending:
    rule: 'tx\.outputs\.length\s*==\s*2'
    description: "Two-output staged withdrawal pattern"
  emergency_path_feature:
    rule: 'function\s+\w*(?:emergency|recover|cold|backup)\w*\s*\('
    description: "Emergency / recovery spend path naming"
  refund_path:
    rule: 'function\s+\w*refund\w*\s*\('
    description: "Timeout refund spend path"
  claim_path:
    rule: 'function\s+\w*(?:claim|release)\w*\s*\('
    description: "Recipient claim / release path"
  goal_threshold_logic:
    rule: '\bgoalAmount\b'
    description: "Crowdfund goal threshold CSV or comparison"
  crowdfund_refund_path:
    rule: 'function\s+\w*refund\w*[\s\S]*goalAmount'
    description: "Contributor refund when goal not met"
