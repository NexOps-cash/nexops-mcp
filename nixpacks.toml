providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python311", "nodejs_22", "gcc"]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "python -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt",
    "npm install"
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn src.server:app --host 0.0.0.0 --port $PORT"
